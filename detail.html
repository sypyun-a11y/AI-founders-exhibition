<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>서비스 상세 · AI 파운더스 전시회</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--red:#e53e3e;--red-d:#c92f2f;--ink:#ffffff;--sub:#b7adad;--line:rgba(255,255,255,.12)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0707;color:var(--ink);font-family:"Pretendard",-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  /* top bar */
  .bar{display:flex;align-items:center;justify-content:space-between;padding:20px 26px;max-width:1180px;margin:0 auto}
  .back{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:#fff}
  .back:hover{opacity:.8}
  .auth{display:flex;align-items:center;gap:9px}
  .loginb{background:var(--red);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-weight:800;font-size:13.5px;cursor:pointer;font-family:inherit}
  .loginb:hover{background:var(--red-d)}
  .uname{font-size:13px;font-weight:700;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .logout{background:rgba(255,255,255,.08);color:#cbb;border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}

  /* hero */
  .hero{background:radial-gradient(80% 120% at 20% 0%,#241210,#140a09 60%,#0d0707);padding:30px 26px 64px}
  .heroIn{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:46px;align-items:center}
  .shotwrap{border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,.55);background:#14132a}
  /* 공용 커버 (목록 카드와 동일) */
  .cover{aspect-ratio:16/10;position:relative;overflow:hidden;background:#1c0f0d;display:flex;align-items:center;justify-content:center}
  .cover .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center}
  .cover .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,6,6,.45),rgba(12,6,6,0) 22%,rgba(12,6,6,.15) 48%,rgba(12,6,6,.93))}
  .cover .top{position:absolute;top:14px;left:14px;right:14px;display:flex;align-items:center;gap:7px;z-index:2}
  .cover .cat{font-size:12px;font-weight:800;padding:5px 12px;border-radius:999px;color:#fff}
  .cover .badge{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:#fff;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.2);padding:5px 10px;border-radius:999px}
  .cover.logo:not(.dark) .badge{color:#3a2a2a;background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.06)}
  .cover .badge .live{width:7px;height:7px;border-radius:50%;background:#41e08a;box-shadow:0 0 7px #41e08a}
  .cover.logo:not(.dark) .badge .live{background:#2bbf6a}
  .cover .info{position:absolute;left:16px;right:16px;bottom:15px;z-index:2}
  .cover .cname{font-size:26px;font-weight:900;color:#fff;line-height:1.16;text-shadow:0 2px 14px rgba(0,0,0,.7)}
  .cover .ctag{font-size:13px;color:rgba(255,255,255,.92);font-weight:600;margin-top:6px;text-shadow:0 1px 8px rgba(0,0,0,.8)}
  .cover .gbg{position:absolute;inset:0}
  .cover .gemoji{position:absolute;top:4px;right:14px;font-size:80px;opacity:.2}
  .llock{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 22px}
  .lmark{font-size:40px;margin-bottom:10px;line-height:1}
  .appicon{width:64px;height:64px;border-radius:18px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:27px;margin-bottom:14px}
  .lname{font-size:33px;font-weight:900;letter-spacing:-.012em;line-height:1.15}
  .lver{font-size:13px;font-weight:700;opacity:.5;margin-left:6px}
  .lsub{font-size:14px;font-weight:600;margin-top:10px;line-height:1.4}
  .info{position:relative}
  .share{position:absolute;top:0;right:0;width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(255,255,255,.1);color:#fff;font-size:20px;display:grid;place-items:center;backdrop-filter:blur(6px);transition:.15s}
  .share:hover{background:rgba(255,255,255,.2)}
  .subtitle{font-size:16px;font-weight:700;color:var(--sub);margin-bottom:10px;padding-right:64px}
  h1{font-size:40px;font-weight:900;letter-spacing:-.02em;line-height:1.18}
  .makers{font-size:16px;color:var(--sub);font-weight:600;margin-top:14px}
  .desc{font-size:16px;line-height:1.72;color:#e9dede;margin-top:22px;white-space:pre-line}
  .tech{display:flex;flex-wrap:wrap;gap:9px;margin-top:26px}
  .tech .t{background:#fff;color:#15121f;font-size:13.5px;font-weight:700;padding:9px 18px;border-radius:999px}

  /* center actions */
  .center{max-width:1180px;margin:0 auto;padding:44px 26px 10px;text-align:center}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:inherit;
    font-weight:800;font-size:16px;padding:17px 0;border-radius:14px;transition:transform .12s;width:min(420px,100%)}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--red);color:#fff;box-shadow:0 10px 30px rgba(229,62,62,.4)}
  .btn.primary:hover{background:var(--red-d)}
  .voterow{margin-top:14px}
  .btn.vote{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--sub);font-size:15px;padding:14px 0;width:min(300px,100%)}
  .btn.vote.on{background:rgba(229,62,62,.16);border-color:rgba(229,62,62,.6);color:var(--red)}
  .acts{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px}
  .acts .btn{width:auto;padding:14px 22px;font-size:15px}
  .acts .btn.primary{flex:1;min-width:180px}

  /* course / funnel section */
  .course{max-width:1180px;margin:46px auto 0;padding:0 26px 70px}
  .course h2{font-size:30px;font-weight:900;margin-bottom:20px}
  .funnel{background:linear-gradient(120deg,rgba(229,62,62,.2),rgba(229,62,62,.06));border:1px solid var(--line);
    border-radius:22px;padding:34px;display:flex;align-items:center;justify-content:space-between;gap:22px;flex-wrap:wrap}
  .funnel .k{font-size:12.5px;font-weight:800;letter-spacing:.14em;color:#ff8a3d}
  .funnel .t{font-size:23px;font-weight:900;margin-top:8px;line-height:1.35}
  .btn.accent{background:linear-gradient(135deg,#ff8a3d,var(--red));color:#fff;width:auto;padding:16px 26px;font-size:16px}

  /* white lower section (다크 히어로 → 화이트 대비) */
  .below{background:#fff;color:#15121f;padding:8px 0 2px}
  .below .center{padding:50px 26px 8px}
  .below .btn.vote{background:#f5f1f1;border:1px solid #e7e0e0;color:#7a6f6f}
  .below .btn.vote.on{background:#ffecec;border-color:#ffb3b3;color:var(--red)}
  .below .course{margin:40px auto 0}
  .below .course h2{color:#15121f}
  .below .funnel{background:linear-gradient(120deg,#fff3f1,#ffe9e3);border:1px solid #f3dcd6}
  .below .funnel .k{color:#e0552e}
  .below .funnel .t{color:#15121f}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:#23110f;
    border:1px solid var(--line);color:#fff;font-size:14px;font-weight:700;padding:13px 22px;border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:.25s;z-index:50}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:820px){
    .heroIn{grid-template-columns:1fr;gap:26px} h1{font-size:30px}
    .share{width:46px;height:46px} .course h2{font-size:24px}
  }
</style>
</head>
<body>
  <div class="bar">
    <a class="back" href="index.html">‹ 전시회 목록으로</a>
  </div>

  <div id="root"></div>
  <div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
const DATA=window.EXHIBIT_DATA, TECH=window.TECH_STACK||[];
const sb=window.supabase?window.supabase.createClient(window.SUPA.url,window.SUPA.key):null;
const voterId=(()=>{let v=localStorage.getItem('exhibitVoter');
  if(!v){v='v'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('exhibitVoter',v);}return v;})();
const key=new URLSearchParams(location.search).get('s');
const d=DATA.find(x=>x.key===key);

let toastT; function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2200);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

if(!d){
  document.getElementById('root').innerHTML='<div style="max-width:1180px;margin:0 auto;padding:60px 26px;color:#b7adad">서비스를 찾을 수 없어요. <a href="index.html" style="color:#ff8a8a;font-weight:700">전시회로 돌아가기</a></div>';
}else{
  document.title=`${d.title} · AI 파운더스 전시회`;
  const cover=window.renderCover(d,'');   // 목록 카드와 동일한 커버
  const tech=TECH.map(t=>`<span class="t">${esc(t)}</span>`).join('');
  document.getElementById('root').innerHTML=`
    <section class="hero"><div class="heroIn">
      <div class="shotwrap">${cover}</div>
      <div class="info">
        <button class="share" id="share" aria-label="공유">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
        <div class="subtitle">${esc(d.tag)}</div>
        <h1>${esc(d.title)}</h1>
        <div class="makers">${esc(d.name)}</div>
        <p class="desc">${esc(d.desc)}</p>
        <div class="tech">${tech}</div>
        <div class="acts">
          <a class="btn primary" href="${d.url}" target="_blank" rel="noopener">서비스 구경하러 가기 →</a>
          <button class="btn vote" id="vote">🤍 투표 · <span id="vcnt">0</span></button>
        </div>
      </div>
    </div></section>

    <div class="below">
      <section class="course">
        <h2>이 강의로 만들었어요</h2>
        <div class="funnel">
          <div><div class="k">AI 파운더스 2기</div>
            <div class="t">비전공자가 코드 한 줄 없이 만들었어요.<br/>나도 이런 서비스를 만들 수 있어요.</div></div>
          <a class="btn accent" href="${window.FOUNDERS2_URL}" target="_blank" rel="noopener">나도 서비스 만들러 가기 →</a>
        </div>
      </section>
    </div>`;

  document.getElementById('share').onclick=async()=>{
    const data={title:d.title,text:`${d.name}님이 만든 "${d.title}" — AI 파운더스 전시회`,url:location.href};
    if(navigator.share){try{await navigator.share(data)}catch(e){}}
    else{try{await navigator.clipboard.writeText(location.href);toast('링크가 복사됐어요!')}catch(e){toast(location.href)}}
  };
  document.getElementById('vote').onclick=()=>toggleVote();
}

/* votes — 로그인 없이 작품당 1표(중복 차단), 표는 Supabase 공유 저장 */
let myVote=false, vcount=0;
const LS_C='votesLocalCounts',LS_V='votesLocalMine';
function paintVote(){ const b=document.getElementById('vote'); if(!b)return;
  b.classList.toggle('on',myVote); b.firstChild.textContent=myVote?'❤️ 투표함 · ':'🤍 투표 · ';
  document.getElementById('vcnt').textContent=vcount; }
function localGet(){ let c={},mine=[]; try{c=JSON.parse(localStorage.getItem(LS_C))||{}}catch(e){}
  try{mine=JSON.parse(localStorage.getItem(LS_V))||[]}catch(e){} vcount=c[d.key]||0; myVote=mine.includes(d.key); }
function localSave(){ let c={},mine; try{c=JSON.parse(localStorage.getItem(LS_C))||{}}catch(e){}
  try{mine=new Set(JSON.parse(localStorage.getItem(LS_V))||[])}catch(e){mine=new Set()}
  c[d.key]=vcount; myVote?mine.add(d.key):mine.delete(d.key);
  localStorage.setItem(LS_C,JSON.stringify(c)); localStorage.setItem(LS_V,JSON.stringify([...mine])); }
async function loadVote(){
  if(!d)return;
  if(!sb){ localGet(); paintVote(); return; }
  const {data,error}=await sb.from('votes').select('voter').eq('service_key',d.key);
  if(error){ console.warn(error.message); localGet(); paintVote(); return; }
  vcount=data.length; myVote=data.some(r=>r.voter===voterId); paintVote();
}
async function toggleVote(){
  if(!d)return;
  myVote=!myVote; vcount=Math.max(0,vcount+(myVote?1:-1)); paintVote();
  if(sb){ try{
    if(!myVote) await sb.from('votes').delete().eq('service_key',d.key).eq('voter',voterId);
    else await sb.from('votes').insert({service_key:d.key,voter:voterId});
  }catch(e){ console.warn(e.message); localSave(); } }
  else localSave();
}
loadVote();
</script>
</body>
</html>
