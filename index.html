<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 파운더스 수강생들 제작 서비스 전시회</title>

<!-- 공유(OG) 메타 — 내일 받을 이미지를 exhibition/og.png 로 넣으면 끝.
     배포 후에는 og:url / og:image 를 실제 도메인 절대경로로 바꿔주세요. -->
<meta property="og:type" content="website" />
<meta property="og:title" content="AI 파운더스 수강생들 제작 서비스 전시회" />
<meta property="og:description" content="비전공자들이 직접 만든 AI 서비스 전시회. 마음에 드는 작품에 투표해 주세요!" />
<meta property="og:image" content="og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="AI 파운더스 수강생들 제작 서비스 전시회" />
<meta name="twitter:image" content="og.png" />

<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{                                   /* AI 파운더스 랜딩 브랜드 토큰 */
    --red:#e53e3e; --red-d:#c92f2f; --red-l:#ff6b6b;
    --orange:#e53e3e;                      /* 랜딩은 솔리드 레드 → 그라데이션도 레드 계열 */
    --purple:#e53e3e; --purple-l:#ff8a8a; --purple-d:#c92f2f;
    --ink:#f4efef; --sub:#b59c9c; --line:rgba(255,255,255,.1);
    --card:rgba(255,255,255,.045); --card-h:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0d;color:var(--ink);
    font-family:"Pretendard",-apple-system,"Apple SD Gothic Neo",sans-serif;-webkit-font-smoothing:antialiased;}

  /* ---------- 입장 인트로 (파티클 필드) ---------- */
  .intro{position:fixed;inset:0;z-index:2000;background:#000;display:grid;place-items:center;overflow:hidden;
    transition:opacity .5s ease}
  .intro.gone{opacity:0;pointer-events:none}
  .warpc{position:absolute;inset:0;z-index:1;display:block;
    transition:transform .6s cubic-bezier(.4,0,.2,1),opacity .6s ease}
  .intro.leaving .warpc{transform:scale(1.08);opacity:.2}
  .intro-in{position:relative;z-index:2;text-align:center;color:#fff;padding:20px;
    transition:transform .4s ease,opacity .35s ease,filter .35s ease}
  .intro.leaving .intro-in{opacity:0;transform:translateY(-5px);filter:blur(2px)}
  .intro-kicker{font-size:12px;font-weight:800;letter-spacing:.28em;color:#9aa0b4;text-transform:uppercase}
  .intro-title{font-size:50px;font-weight:900;line-height:1.18;letter-spacing:-.02em;margin:20px 0 16px;color:#fff}
  .intro-sub{font-size:15.5px;color:#7c8194;font-weight:500;letter-spacing:.02em;margin-bottom:40px}
  .intro-enter{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:999px;
    padding:15px 46px;font-size:15.5px;font-weight:700;letter-spacing:.04em;cursor:pointer;font-family:inherit;transition:.25s}
  .intro-enter:hover{background:#fff;color:#000;border-color:#fff;letter-spacing:.14em}
  @media(max-width:560px){.intro-title{font-size:34px}}
  a{color:inherit;text-decoration:none}

  /* ---------- cosmic background ---------- */
  .space{position:fixed;inset:0;z-index:-2;
    background:
      radial-gradient(80% 60% at 50% -5%, #17161d, #0c0b10 55%, #08080b 100%),
      radial-gradient(48% 36% at 84% 0%, rgba(229,62,62,.10), transparent 62%);}
  .stars,.stars2,.planet{display:none}

  /* ---------- hero ---------- */
  .hero{text-align:center;padding:64px 20px 30px;position:relative}
  .hero .kick{display:inline-block;font-size:11.5px;font-weight:800;letter-spacing:.22em;color:var(--red);
    border:1px solid rgba(229,62,62,.45);padding:6px 14px;border-radius:999px}
  .hero h1{font-size:48px;font-weight:900;letter-spacing:-.02em;margin:20px 0 14px;line-height:1.2}
  .hero h1 .hl{background:linear-gradient(100deg,var(--red),var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .hook{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0 10px}
  .hero .hook .chip{font-size:12.5px;font-weight:600;color:#c9c5d2;background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.12);padding:8px 14px;border-radius:999px;letter-spacing:.01em}
  .hero .sub{font-size:22px;color:var(--sub);font-weight:600;line-height:1.5;margin-top:6px}
  .cta-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:26px}
  .tally{margin-top:18px;display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:var(--sub);
    background:rgba(255,255,255,.05);border:1px solid var(--line);padding:8px 16px;border-radius:999px}
  .tally b{color:var(--red)}

  /* 이벤트: 카운트다운 + 투표 일정 + 시크릿 쿠폰(투표 완료 후 공개) */
  .event{max-width:480px;margin:26px auto 0;display:flex;flex-direction:column;gap:16px}
  .ev-meta{display:flex;flex-direction:column;align-items:center;gap:4px}
  .ev-cd{font-size:17.5px;font-weight:700;color:#e9b9b9;letter-spacing:.01em}
  .ev-cd b{color:var(--red);font-variant-numeric:tabular-nums}
  .ev-sch{font-size:12.5px;font-weight:600;color:#8b8794}
  .event-bottom{max-width:560px;margin:6px auto 50px}
  .coupon{display:flex;align-items:center;gap:13px;text-align:left;cursor:pointer;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,170,120,.28);border-radius:16px;padding:15px 18px;transition:.18s}
  .coupon:hover{border-color:rgba(255,170,120,.5);background:rgba(255,255,255,.06)}
  .coupon.unlocked{cursor:default;border-color:rgba(255,138,61,.7);
    background:linear-gradient(120deg,rgba(229,62,62,.16),rgba(255,138,61,.1))}
  .cp-ico{font-size:22px;line-height:1;flex:0 0 auto}
  .cp-body{flex:1;min-width:0}
  .cp-msg{font-size:14.5px;font-weight:800;color:#fff;line-height:1.35}
  .cp-sub{font-size:12px;font-weight:600;color:#9a8f86;margin-top:3px}
  .cp-code{margin-top:7px;display:inline-block;font-size:12.5px;font-weight:800;letter-spacing:.04em;color:#ffd9a8;
    background:rgba(0,0,0,.3);border:1px dashed rgba(255,200,150,.5);border-radius:8px;padding:3px 9px}
  .cp-chev{flex:0 0 auto;color:#caa8a0;opacity:.75}
  .cp-cta{flex:0 0 auto;background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;font-weight:800;font-size:12.5px;
    padding:10px 16px;border-radius:10px;white-space:nowrap}
  .cp-cta:hover{box-shadow:0 6px 18px rgba(255,90,95,.4)}

  .btn{display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;font-family:inherit;
    font-weight:800;font-size:14.5px;padding:13px 22px;border-radius:13px;transition:transform .12s,box-shadow .12s,background .15s}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:#fff;color:#1a1430}
  .btn.primary:hover{box-shadow:0 8px 24px rgba(255,255,255,.18)}
  .btn.accent{background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;box-shadow:0 8px 24px rgba(255,90,95,.35)}
  .btn.accent:hover{box-shadow:0 10px 30px rgba(255,90,95,.5)}
  .btn.ghost{background:rgba(255,255,255,.07);color:#fff;border:1px solid var(--line)}
  .btn.ghost:hover{background:rgba(255,255,255,.14)}
  .btn.big{font-size:16.5px;padding:17px 34px;border-radius:14px}

  /* ---------- toolbar ---------- */
  .wrap{max-width:1080px;margin:0 auto;padding:0 18px}
  .bar{display:flex;align-items:center;gap:12px;margin:26px auto 20px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.05);
    border:1px solid var(--line);border-radius:13px;padding:11px 15px}
  .search input{border:none;outline:none;font-size:14.5px;width:100%;color:var(--ink);background:transparent;font-family:inherit}
  .search input::placeholder{color:var(--sub)}
  .search svg{flex:0 0 auto;color:var(--sub)}
  .sort{display:flex;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:13px;padding:4px}
  .sort button{border:none;background:none;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;
    color:var(--sub);padding:8px 14px;border-radius:10px;transition:.15s}
  .sort button.on{background:linear-gradient(135deg,var(--orange),var(--red));color:#fff}

  /* ---------- top nav (회사 로고) ---------- */
  .nav{display:flex;align-items:center;justify-content:space-between;max-width:1120px;
    margin:0 auto;padding:18px 22px;position:relative;z-index:3}
  .brand{display:inline-flex;align-items:center;gap:9px}
  .logo-img{width:28px;height:28px;border-radius:7px;object-fit:contain}
  .logo-svg{display:none;align-items:center}
  .wm{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.01em}
  .auth{display:flex;align-items:center;gap:9px}
  .auth .loginb{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;border:none;
    border-radius:10px;padding:9px 16px;font-weight:800;font-size:13.5px;cursor:pointer;font-family:inherit}
  .auth .loginb:hover{background:var(--red-d)}
  .auth .uname{font-size:13px;color:var(--ink);font-weight:700;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .auth .logout{background:rgba(255,255,255,.07);color:#cbb;border:1px solid var(--line);border-radius:9px;
    padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}

  /* ---------- exhibition section (히어로와 배경 분리) ---------- */
  .exhibit{position:relative;background:#0c0b10;color:#e8e6ee;border-radius:30px 30px 0 0;
    margin-top:24px;padding:14px 0 1px;box-shadow:0 -26px 70px rgba(0,0,0,.55)}
  .exhibit::before{content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);
    width:46px;height:4px;border-radius:3px;background:rgba(255,255,255,.14);margin-top:13px}

  /* 가이드 / 핫 TOP3 / 카테고리 칩 (다크 갤러리) */
  .guide{font-size:13.5px;color:#f4f2f8;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);
    border-radius:12px;padding:13px 17px;margin-bottom:22px;line-height:1.55;letter-spacing:.01em}
  .guide b{color:#ffffff;font-weight:700}
  .hot{margin-bottom:30px}
  .hot .hot-h{font-size:15px;font-weight:800;color:#f3f1f7;margin-bottom:15px;letter-spacing:.01em;display:flex;align-items:center;gap:9px}
  .hot .hot-h::before{content:"";width:20px;height:2px;border-radius:2px;background:linear-gradient(90deg,#ff8a3d,#e53e3e)}
  .hot .hot-h .sub{font-size:12px;font-weight:600;color:#807c8a;letter-spacing:0}
  .hot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:840px){.hot-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.hot-grid{grid-template-columns:1fr}}
  .cats{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:22px}
  .chip-cat{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);color:#9a96a6;border-radius:999px;
    padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;letter-spacing:.01em}
  .chip-cat:hover{border-color:rgba(255,255,255,.3);color:#e8e6ee}
  .chip-cat.on{background:#fff;color:#0c0b10;border-color:#fff;font-weight:700}
  .chip-cat .cnt{opacity:.55;margin-left:6px}

  /* ---------- grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding-bottom:50px}
  @media(max-width:840px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.grid{grid-template-columns:1fr}.hero h1{font-size:34px}.hero .sub{font-size:18px}}

  /* pagination */
  .pager{display:flex;justify-content:center;align-items:center;gap:7px;padding:4px 0 48px}
  .pg{min-width:40px;height:40px;padding:0 11px;border:1px solid var(--line);background:rgba(255,255,255,.04);
    color:var(--sub);border-radius:11px;font-family:inherit;font-weight:800;font-size:14px;cursor:pointer;transition:.15s}
  .pg:hover:not(:disabled){background:rgba(255,255,255,.1);color:#fff}
  .pg.on{background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;border-color:transparent}
  .pg:disabled{opacity:.35;cursor:default}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;
    cursor:pointer;transition:transform .16s,box-shadow .16s,border-color .16s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-5px);border-color:rgba(229,62,62,.45);
    box-shadow:0 18px 44px rgba(120,28,28,.4)}
  .thumb{position:relative;aspect-ratio:16/10;background:#14132a;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;transition:transform .3s}
  .card:hover .thumb img{transform:scale(1.05)}
  .rank{position:absolute;top:10px;left:10px;background:rgba(6,6,15,.7);color:#fff;font-size:12px;font-weight:800;
    padding:5px 10px;border-radius:9px;backdrop-filter:blur(4px)}
  .rank.medal{background:linear-gradient(135deg,#ffd34d,#ff9f43);color:#3a2a00}
  .body{padding:14px 16px 6px;flex:1}
  .ttl{font-size:16px;font-weight:800;line-height:1.3}
  .mk{font-size:12.5px;color:var(--sub);font-weight:600;margin-top:4px}
  .foot{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 14px}
  .more{font-size:12.5px;font-weight:700;color:var(--purple-l)}
  .vote{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,90,95,.4);background:rgba(255,90,95,.1);
    border-radius:999px;padding:8px 16px;cursor:pointer;font-family:inherit;font-weight:800;font-size:13.5px;
    color:#ff9a9a;transition:transform .14s,box-shadow .14s,background .16s,color .16s,border-color .16s}
  .vote:hover{background:linear-gradient(135deg,var(--orange),var(--red));border-color:transparent;color:#fff;
    transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,90,95,.45)}
  .vote.on{background:linear-gradient(135deg,var(--orange),var(--red));border-color:transparent;color:#fff;
    box-shadow:0 4px 14px rgba(255,90,95,.38)}
  .vote .h{font-size:15px;line-height:1}
  .vote.pop .h{animation:pop .35s}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.5)}100%{transform:scale(1)}}

  /* cover: 실제 화면 배경 + 텍스트 오버레이 */
  .cover{aspect-ratio:16/10;position:relative;overflow:hidden;background:#1c0f0d}
  .cover .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform .3s}
  .card:hover .cover .bg{transform:scale(1.04)}
  .cover .scrim{position:absolute;inset:0;background:
    linear-gradient(180deg,rgba(12,6,6,.45) 0%,rgba(12,6,6,0) 22%,rgba(12,6,6,.15) 48%,rgba(12,6,6,.93) 100%)}
  .cover .top{position:absolute;top:12px;left:12px;right:12px;display:flex;align-items:center;gap:7px;z-index:2}
  .cover .cat{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;color:#fff}
  .cover .rankc{font-size:11px;font-weight:900;padding:4px 9px;border-radius:999px;background:rgba(0,0,0,.5);
    color:#fff;border:1px solid rgba(255,255,255,.25)}
  .cover .rankc.medal{background:linear-gradient(135deg,#ffd34d,#ff9f43);color:#3a2a00;border:none}
  .cover .badge{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;color:#fff;
    background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.2);padding:5px 9px;border-radius:999px}
  .badge .live{width:7px;height:7px;border-radius:50%;background:#41e08a;box-shadow:0 0 8px #41e08a}
  .cover .info{position:absolute;left:15px;right:15px;bottom:13px;z-index:2}
  .cover .cname{font-size:22px;font-weight:900;color:#fff;line-height:1.16;text-shadow:0 2px 14px rgba(0,0,0,.7)}
  .cover .ctag{font-size:12.5px;color:rgba(255,255,255,.92);font-weight:600;margin-top:6px;line-height:1.4;
    text-shadow:0 1px 8px rgba(0,0,0,.8);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .cover .gbg{position:absolute;inset:0}
  .cover .gemoji{position:absolute;top:2px;right:10px;font-size:62px;opacity:.2;z-index:1}
  .shotcap{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:#7fe0a6;padding:10px 22px 0}

  /* logo cover (로고 참고 → 우리 스타일 통일) */
  .cover.logo{display:flex;align-items:center;justify-content:center}
  .cover.logo:not(.dark) .badge{color:#3a2a2a;background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.06)}
  .cover.logo:not(.dark) .badge .live{background:#2bbf6a;box-shadow:0 0 7px #2bbf6a}
  .llock{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 18px}
  .lmark{font-size:30px;margin-bottom:7px;line-height:1}
  .appicon{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:21px;margin-bottom:11px}
  .lname{font-size:24px;font-weight:900;letter-spacing:-.012em;line-height:1.15}
  .lver{font-size:11px;font-weight:700;opacity:.5;margin-left:5px}
  .lsub{font-size:12px;font-weight:600;margin-top:8px;line-height:1.4}

  /* ---------- conversion banner ---------- */
  .convert{margin:6px auto 50px;background:linear-gradient(120deg,rgba(229,62,62,.2),rgba(229,62,62,.07));
    border:1px solid var(--line);border-radius:22px;padding:30px 34px;display:flex;align-items:center;
    justify-content:space-between;gap:20px;flex-wrap:wrap}
  .convert .ct-k{font-size:12px;font-weight:800;letter-spacing:.14em;color:var(--orange)}
  .convert .ct-t{font-size:22px;font-weight:900;line-height:1.35;margin-top:8px}


  /* ---------- toast / footer ---------- */
  .toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);
    background:#23110f;border:1px solid var(--line);color:#fff;font-size:14px;font-weight:700;
    padding:13px 22px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:.25s;z-index:200}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{text-align:center;color:var(--sub);font-size:12.5px;padding:24px 20px 44px;line-height:1.7}
  .empty{grid-column:1/-1;text-align:center;color:var(--sub);padding:50px 0;font-weight:600}
</style>
</head>
<body>
  <!-- 입장 인트로 (전시회 입구) -->
  <div class="intro" id="intro">
    <canvas class="warpc" id="warpc"></canvas>
    <div class="intro-in">
      <div class="intro-kicker">TEAM SPARTA · AI 파운더스 1기</div>
      <h1 class="intro-title">AI 파운더스 수강생<br/>제작 서비스 전시회</h1>
      <p class="intro-sub">비전공자들이 직접 만든 AI 서비스</p>
      <button class="intro-enter" id="enter">입장하기</button>
    </div>
  </div>

  <div class="space"></div><div class="stars"></div><div class="stars2"></div><div class="planet"></div>

  <nav class="nav">
    <a class="brand" href="https://spartacodingclub.kr/" target="_blank" rel="noopener" aria-label="스파르타코딩클럽">
      <img class="logo-img" src="logo.png" alt="스파르타코딩클럽"
        onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex'"/>
      <span class="logo-svg">
        <svg width="28" height="28" viewBox="0 0 100 100" aria-hidden="true">
          <path d="M50 3 L88 23 a8 8 0 0 1 4 7 V70 a8 8 0 0 1-4 7 L50 97 L12 77 a8 8 0 0 1-4-7 V30 a8 8 0 0 1 4-7 Z" fill="#e53e3e"/>
          <text x="51" y="70" font-size="64" font-weight="900" text-anchor="middle" fill="#fff" font-family="Pretendard,sans-serif">S</text>
        </svg>
      </span>
      <span class="wm">AI 파운더스</span>
    </a>
  </nav>

  <div class="hero">
    <span class="kick">TEAM SPARTA · AI 파운더스 1기</span>
    <h1><span class="hl">AI 파운더스</span> 수강생 제작<br/>서비스 전시회</h1>
    <p class="sub">가장 혁신적인 서비스에 투표하고, 1기 베스트 서비스를 직접 뽑아주세요</p>
    <div class="cta-row">
      <button class="btn accent big" id="cta-vote">❤️ 베스트 서비스 투표하기</button>
      <button class="btn ghost" id="cta-share">🔗 공유</button>
    </div>
    <div class="tally" style="display:none">❤️ 지금까지 <b id="total">0</b>표</div>
    <div class="event">
      <div class="ev-meta">
        <span class="ev-cd" id="cd">⏳ 투표 마감까지 계산 중…</span>
      </div>
    </div>
  </div>

  <section class="exhibit">
    <div class="wrap">
      <div class="guide"><b>이렇게 둘러보세요</b> &nbsp; ① 관심 카테고리로 보기 &nbsp; ② <b>공감·유용·관심</b> 가는 작품에 ❤️ 투표 &nbsp; ③ 직접 써보기</div>
      <div class="hot" id="hot"></div>
      <div class="cats" id="cats"></div>
      <div class="bar">
        <label class="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-3.5-3.5"/></svg>
          <input id="q" type="text" placeholder="서비스나 이름으로 검색…" />
        </label>
        <div class="sort">
          <button id="s-reg" class="on">조 순서</button>
          <button id="s-pop">득표순</button>
        </div>
      </div>

    <div class="wrap"><div class="grid" id="grid"></div></div>
    <div class="wrap"><div class="pager" id="pager"></div></div>

    <div class="wrap"><div class="event-bottom">
      <div class="coupon" id="coupon">
        <span class="cp-ico" id="cp-ico">🎁</span>
        <div class="cp-body">
          <div class="cp-msg" id="cp-msg"></div>

        </div>
        <svg class="cp-chev" id="cp-chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        <a class="cp-cta" id="cp-cta" href="#" target="_blank" rel="noopener" style="display:none">받으러 가기 →</a>

<script src="data.js"></script>
<script>
/* ---------- data (공용 data.js) ---------- */
const DATA=window.EXHIBIT_DATA;

/* ---------- votes: 로그인 없이 작품당 1표(중복 차단), 여러 작품 투표 허용 ----------
   브라우저별 voterId로 중복만 막고, 표는 Supabase votes 테이블에 공유 저장.
   Supabase 미설정/오류 시 localStorage 폴백. */
const sb=window.supabase?window.supabase.createClient(window.SUPA.url,window.SUPA.key):null;
const voterId=(()=>{let v=localStorage.getItem('exhibitVoter');
  if(!v){v='v'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('exhibitVoter',v);}return v;})();
let counts={}, voted=new Set();
const LS_C='votesLocalCounts',LS_V='votesLocalMine';
function loadLocal(){try{counts=JSON.parse(localStorage.getItem(LS_C))||{}}catch(e){counts={}}
  try{voted=new Set(JSON.parse(localStorage.getItem(LS_V))||[])}catch(e){voted=new Set()}}
function saveLocal(){localStorage.setItem(LS_C,JSON.stringify(counts));localStorage.setItem(LS_V,JSON.stringify([...voted]));}
async function loadVotes(){
  if(!sb){ loadLocal(); return; }
  const { data, error } = await sb.from('votes').select('service_key,voter');
  if(error){ console.warn('votes load → local fallback:',error.message); loadLocal(); return; }
  counts={}; voted=new Set();
  for(const r of data){ counts[r.service_key]=(counts[r.service_key]||0)+1; if(r.voter===voterId) voted.add(r.service_key); }
}
async function toggleVote(key){
  const has=voted.has(key);
  if(has){voted.delete(key);counts[key]=Math.max(0,(counts[key]||1)-1);}
  else{voted.add(key);counts[key]=(counts[key]||0)+1;}
  refreshCounts();
  if(!has && window.logEvent) logEvent('투표',{service:key});
  if(sb){ try{
    if(has) await sb.from('votes').delete().eq('service_key',key).eq('voter',voterId);
    else    await sb.from('votes').insert({service_key:key,voter:voterId});
  }catch(e){ console.warn('vote save:',e.message); saveLocal(); } }
  else saveLocal();
}

/* ---------- render ---------- */
const grid=document.getElementById('grid');
let sortMode='reg',query='',page=1,activeCat=null;
const PAGE_SIZE=9;
function visible(){
  let list=DATA.filter(d=>(!activeCat||d.cat===activeCat)&&(!query||d.name.includes(query)||d.title.includes(query)||d.host.includes(query)));
  if(sortMode==='pop')list=[...list].sort((a,b)=>(counts[b.key]||0)-(counts[a.key]||0)||DATA.indexOf(a)-DATA.indexOf(b));
  return list;
}
function cardHTML(d,rank){
  const c=counts[d.key]||0,on=voted.has(d.key);
  const medal=sortMode==='pop'&&rank<=3&&c>0;
  const rankc=sortMode==='pop'?`<span class="rankc ${medal?'medal':''}">${medal?['🥇','🥈','🥉'][rank-1]:'#'+rank}</span>`:'';
  const cover=window.renderCover(d, rankc);
  return `<div class="card" data-key="${d.key}">${cover}
    <div class="body"><div class="mk">${d.name} 님 · ${d.cat}</div></div>
    <div class="foot"><span class="more">자세히 보기 →</span>
      <button class="vote ${on?'on':''}" data-vote="${d.key}"><span class="h">${on?'❤️':'🤍'}</span><span class="cnt">${on?c:(c>0?c:'투표')}</span></button>
    </div></div>`;
}
function render(){
  renderCats(); renderHot();
  const list=visible();
  const pages=Math.max(1,Math.ceil(list.length/PAGE_SIZE));
  if(page>pages) page=pages;
  const start=(page-1)*PAGE_SIZE, slice=list.slice(start,start+PAGE_SIZE);
  grid.innerHTML=list.length?slice.map((d,i)=>cardHTML(d,start+i+1)).join(''):'<div class="empty">검색 결과가 없어요</div>';
  renderPager(pages);
}
function renderPager(pages){
  const el=document.getElementById('pager');
  if(pages<=1){el.innerHTML='';return;}
  let h=`<button class="pg" data-pg="${page-1}" ${page===1?'disabled':''}>‹</button>`;
  for(let p=1;p<=pages;p++) h+=`<button class="pg ${p===page?'on':''}" data-pg="${p}">${p}</button>`;
  h+=`<button class="pg" data-pg="${page+1}" ${page===pages?'disabled':''}>›</button>`;
  el.innerHTML=h;
}
document.getElementById('pager').addEventListener('click',e=>{
  const b=e.target.closest('.pg'); if(!b||b.disabled) return;
  const p=parseInt(b.dataset.pg,10); if(isNaN(p)) return;
  page=p; render();
  document.querySelector('.exhibit').scrollIntoView({behavior:'smooth',block:'start'});
});

/* ---------- category chips + hot top 3 ---------- */
const CAT_EMOJI={'금융':'💰','생산성':'🛠️','마케팅':'📣','교육·커리어':'🎓','건강·자기계발':'🌱','라이프':'🍱','반려·가족':'🐾','독서':'📖'};
function catList(){
  const order=[],map={};
  for(const d of DATA){ if(!map[d.cat]){map[d.cat]={cat:d.cat,color:d.color,n:0};order.push(map[d.cat]);} map[d.cat].n++; }
  return order;
}
function renderCats(){
  const el=document.getElementById('cats'); if(!el)return;
  let h=`<button class="chip-cat ${activeCat===null?'on':''}" data-cat="">전체<span class="cnt">${DATA.length}</span></button>`;
  for(const c of catList()){ const on=activeCat===c.cat;
    h+=`<button class="chip-cat ${on?'on':''}" data-cat="${c.cat}">${c.cat}<span class="cnt">${c.n}</span></button>`; }
  el.innerHTML=h;
}
document.getElementById('cats').addEventListener('click',e=>{
  const b=e.target.closest('.chip-cat'); if(!b)return;
  activeCat=b.dataset.cat||null; page=1; render();
  document.querySelector('.exhibit').scrollIntoView({behavior:'smooth',block:'start'});
});
function renderHot(){
  const el=document.getElementById('hot'); if(!el)return;
  if(activeCat||query){ el.innerHTML=''; return; }
  const n=DATA.length, slot=(new Date().getHours()*3)%n;   // 시간대별 로테이션
  const picks=[DATA[slot%n], DATA[(slot+1)%n], DATA[(slot+2)%n]];
  el.innerHTML='<div class="hot-h">지금 주목할 작품 <span class="sub">· 시간마다 바뀌어요</span></div>'+
    '<div class="hot-grid">'+picks.map(d=>cardHTML(d,99)).join('')+'</div>';
}
document.getElementById('hot').addEventListener('click',e=>{
  const v=e.target.closest('.vote');
  if(v){ e.stopPropagation(); v.classList.remove('pop'); void v.offsetWidth; v.classList.add('pop'); toggleVote(v.dataset.vote); return; }
  const card=e.target.closest('.card');
  if(card) location.href='detail.html?s='+encodeURIComponent(card.dataset.key);
});
const TALLY_MIN=10;   // 누적 표가 이만큼 쌓이기 전엔 상단 '0표' 집계 숨김
function refreshCounts(){
  document.querySelectorAll('.vote').forEach(b=>{const k=b.dataset.vote,c=counts[k]||0,on=voted.has(k);
    b.querySelector('.cnt').textContent=on?c:(c>0?c:'투표');b.querySelector('.h').textContent=on?'❤️':'🤍';b.classList.toggle('on',on);});
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  document.getElementById('total').textContent=total;
  const tally=document.querySelector('.tally'); if(tally) tally.style.display=total>=TALLY_MIN?'inline-flex':'none';
  updateCoupon();
}

/* ---------- event: 카운트다운 + 투표완료 시크릿 쿠폰 ---------- */
const EV=window.EVENT||{coupon:{}};
function updateCoupon(){
  const box=document.getElementById('coupon'); if(!box||!EV.coupon) return;
  const unlocked=voted.size>0;
  const ico=document.getElementById('cp-ico'),msg=document.getElementById('cp-msg'),
        sub=document.getElementById('cp-sub'),code=document.getElementById('cp-code'),
        cta=document.getElementById('cp-cta'),chev=document.getElementById('cp-chev');
  box.classList.toggle('unlocked',unlocked);
  if(unlocked){
    ico.textContent='🎉';
    msg.innerHTML='시크릿 혜택 해제! <span style="color:#ffd9a8">'+EV.coupon.benefit+'</span>';
    if(sub) sub.style.display='none';
    if(chev) chev.style.display='none';
    if(EV.coupon.code){code.textContent='쿠폰코드 '+EV.coupon.code;code.style.display='inline-block';}
    else code.style.display='none';
    cta.style.display='';
  }else{
    ico.textContent='🎁';
    msg.textContent=EV.coupon.teaser;
    if(sub){sub.textContent=EV.coupon.teaserSub||'';sub.style.display='';}
    code.style.display='none';cta.style.display='none';
    if(chev) chev.style.display='';
  }
}
(function initEvent(){
  const sch=document.getElementById('ev-sch'); if(sch) sch.textContent=EV.scheduleText||'';
  const box=document.getElementById('coupon');
  if(box) box.addEventListener('click',e=>{
    if(box.classList.contains('unlocked')||e.target.closest('.cp-cta')) return;
    sortMode='pop';setSort();document.querySelector('.exhibit').scrollIntoView({behavior:'smooth',block:'start'});
  });
  const cta=document.getElementById('cp-cta');
  if(cta){ const ref=new URLSearchParams(location.search).get('ref');
    cta.href=window.FOUNDERS2_URL+(ref?(window.FOUNDERS2_URL.includes('?')?'&':'?')+'ref='+encodeURIComponent(ref):'');
    cta.textContent=(EV.coupon&&EV.coupon.ctaLabel)||'받으러 가기 →';
    cta.addEventListener('click',()=>window.logEvent&&logEvent('쿠폰CTA')); }
  const close=EV.voteCloseISO?new Date(EV.voteCloseISO).getTime():0, cdEl=document.getElementById('cd');
  function tick(){
    if(!cdEl||!close) return;
    let s=Math.floor((close-Date.now())/1000);
    if(s<=0){ cdEl.innerHTML='🗳️ 투표 마감'; return; }
    const d=Math.floor(s/86400); s-=d*86400; const h=Math.floor(s/3600); s-=h*3600;
    const m=Math.floor(s/60), ss=s-m*60, p=n=>String(n).padStart(2,'0');
    cdEl.innerHTML='⏳ 투표 마감까지 <b>'+d+'일 '+p(h)+':'+p(m)+':'+p(ss)+'</b>';
  }
  tick(); setInterval(tick,1000); updateCoupon();
})();

/* card interactions: vote, or open the detail PAGE */
grid.addEventListener('click',e=>{
  const v=e.target.closest('.vote');
  if(v){e.stopPropagation();v.classList.remove('pop');void v.offsetWidth;v.classList.add('pop');toggleVote(v.dataset.vote);return;}
  const card=e.target.closest('.card');
  if(card) location.href='detail.html?s='+encodeURIComponent(card.dataset.key);
});

/* ---------- CTAs · share ---------- */
const FOUNDERS2_URL=window.FOUNDERS2_URL;   // AI 파운더스 랜딩(유입)
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2200);}
document.getElementById('cta-vote').onclick=()=>{sortMode='pop';setSort();document.querySelector('.exhibit').scrollIntoView({behavior:'smooth',block:'start'});};
document.querySelectorAll('#cta-make,#cta-make2').forEach(a=>{
  const ref=new URLSearchParams(location.search).get('ref');
  a.href=FOUNDERS2_URL+(ref?(FOUNDERS2_URL.includes('?')?'&':'?')+'ref='+encodeURIComponent(ref):'');
  a.addEventListener('click',()=>{ window.logEvent&&logEvent('2기클릭'); });
});
document.getElementById('cta-share').onclick=async()=>{
  window.logEvent&&logEvent('공유');
  const data={title:'AI 파운더스 수강생들 제작 서비스 전시회',
    text:`비전공자들이 직접 만든 ${DATA.length}개 AI 서비스 — 마음에 드는 작품에 투표해 주세요!`,url:location.href};
  if(navigator.share){try{await navigator.share(data);}catch(e){}}
  else{try{await navigator.clipboard.writeText(location.href);toast('링크가 복사됐어요!');}catch(e){toast('링크: '+location.href);}}
};
document.getElementById('q').addEventListener('input',e=>{query=e.target.value.trim();page=1;render();});
document.getElementById('s-reg').onclick=()=>{sortMode='reg';setSort();};
document.getElementById('s-pop').onclick=()=>{sortMode='pop';setSort();};
function setSort(){page=1;document.getElementById('s-reg').classList.toggle('on',sortMode==='reg');
  document.getElementById('s-pop').classList.toggle('on',sortMode==='pop');render();}

/* ---------- 입장 인트로 (파티클 스타필드 + 워프) ---------- */
(function intro(){
  const el=document.getElementById('intro'); if(!el) return;
  if(sessionStorage.getItem('entered') || /[?&]e=1/.test(location.search)){ el.remove(); return; }  // 재방문/딥링크 시 생략
  const cv=document.getElementById('warpc'), ctx=cv.getContext('2d');
  let W,H,cx,cy,dpr;
  function resize(){ dpr=Math.min(devicePixelRatio||1,2);
    cv.width=innerWidth*dpr; cv.height=innerHeight*dpr; cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
    W=cv.width; H=cv.height; cx=W/2; cy=H/2; }
  resize(); addEventListener('resize',resize);
  const N=Math.min(680,Math.max(280,Math.floor(innerWidth*innerHeight/2600)));
  const ps=[];
  function reset(p,fresh){ p.x=Math.random()*2-1; p.y=Math.random()*2-1; p.z=fresh?Math.random():1; p.pz=p.z; }
  for(let i=0;i<N;i++){ const p={}; reset(p,true); ps.push(p); }
  let step=0.0011, leaving=false, alive=true, raf;
  function frame(){
    if(!alive) return;
    raf=requestAnimationFrame(frame);
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    const sp=Math.min(W,H)*0.62;
    for(const p of ps){
      p.z-=step;
      if(p.z<=0.02){ reset(p,false); continue; }
      const k=1/p.z, sx=cx+p.x*k*sp, sy=cy+p.y*k*sp;
      if(sx<0||sx>W||sy<0||sy>H) continue;
      const size=Math.max(0.7*dpr,(k-1)*1.0*dpr), a=Math.min(1,(1-p.z)*1.25);
      ctx.globalAlpha=a; ctx.fillStyle='#fff'; ctx.fillRect(sx-size/2,sy-size/2,size,size);
    }
    ctx.globalAlpha=1;
  }
  frame();
  const btn=document.getElementById('enter');
  btn&&(btn.onclick=function(){
    if(leaving) return; leaving=true;
    sessionStorage.setItem('entered','1');
    window.logEvent&&logEvent('입장');
    el.classList.add('leaving');                         // 잔잔히 빨려 들어가며 빠르게 페이드
    setTimeout(()=>el.classList.add('gone'),180);
    setTimeout(()=>{ alive=false; cancelAnimationFrame(raf); el.remove(); },720);
  });
})();

/* ---------- init ---------- */
window.logEvent&&logEvent('진입');
(async()=>{ render(); await loadVotes(); render(); refreshCounts(); })();
</script>
